<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Local Fonts in the project (portable) -->
  <dir prefix="cwd">src/lib/fontconfig/fonts</dir>
  <dir>src/lib/fontconfig/fonts</dir>

  <!-- Windows Fonts -->
  <dir>C:/Windows/Fonts</dir>

  <!-- Linux Fonts -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir>~/.fonts</dir>

  <config></config>
</fontconfig>
